        // Função para atualizar página ativa e highlight do menu
        let currentPage = "home";
        
        function renderPage(pageId) {
        const contentDiv = document.querySelector("#main-content");
        if (!contentDiv) return;
        if (pages[pageId]) {
            contentDiv.innerHTML = pages[pageId];
            currentPage = pageId;
            // Reinicializar animações AOS para novos elementos
            AOS.refresh();
            // Reaplicar evento de busca na HOME (campo search)
            if (pageId === "home") {
            const searchBtn = document.getElementById("searchBtnTreat");
            const searchInput = document.getElementById("treatmentSearch");
            if (searchBtn && searchInput) {
                const handleSearch = () => {
                const term = searchInput.value.trim();
                if(term) alert(`🔍 Resultados para "${term}": Entre em contato para agendar uma avaliação personalizada.`);
                else alert("Digite um tratamento, ex: clareamento, implante");
                };
                searchBtn.onclick = handleSearch;
                searchInput.onkeypress = (e) => { if(e.key === "Enter") handleSearch(); };
            }
            }
            // Se página book, adicionar evento de submit
            if (pageId === "book") {
            const formBooking = document.getElementById("bookingForm");
            if (formBooking) {
                formBooking.onsubmit = (e) => {
                e.preventDefault();
                const nome = document.getElementById("nome")?.value;
                if(nome) alert(`✅ Obrigado ${nome}, sua consulta foi pré-agendada! Entraremos em contato.`);
                else alert("Por favor preencha o nome.");
                };
            }
            }
            // Rodar função de highlight do menu
            updateActiveMenu(pageId);
        } else {
            contentDiv.innerHTML = `<div class="p-10 text-center"><h2>Página não encontrada</h2></div>`;
        }
        // scroll suave para topo
        window.scrollTo({ top: 0, behavior: "smooth" });
        }
        
        function updateActiveMenu(page) {
        document.querySelectorAll(".nav-item").forEach(link => {
            const pg = link.getAttribute("data-page");
            if (pg === page) {
            link.classList.add("active-nav");
            } else {
            link.classList.remove("active-nav");
            }
        });
        document.querySelectorAll(".nav-item-mobile").forEach(link => {
            const pg = link.getAttribute("data-page");
            if (pg === page) {
            link.classList.add("text-emerald-600", "font-bold");
            } else {
            link.classList.remove("text-emerald-600", "font-bold");
            }
        });
        }
        
        function attachNavEvents() {
        const links = document.querySelectorAll("[data-page]");
        links.forEach(link => {
            link.addEventListener("click", (e) => {
            e.preventDefault();
            const page = link.getAttribute("data-page");
            if (page) {
                renderPage(page);
                // Fechar menu mobile após click
                const mobileMenuDiv = document.getElementById("mobileMenu");
                if (mobileMenuDiv && !mobileMenuDiv.classList.contains("hidden")) {
                mobileMenuDiv.classList.add("hidden");
                }
            }
            });
        });
        // mobile menu toggle
        const mobileBtn = document.getElementById("mobileMenuBtn");
        const mobileMenuDiv = document.getElementById("mobileMenu");
        if (mobileBtn && mobileMenuDiv) {
            mobileBtn.addEventListener("click", () => {
            mobileMenuDiv.classList.toggle("hidden");
            });
        }
        }
        
        // init
        renderPage("home");
        attachNavEvents();
        
        // reattach para links que forem adicionados dinamicamente após render, mas como usamos delegation nos data-page via document, já funciona.
        // também quando renderizar devemos re-ancorar eventos
        const observer = new MutationObserver(() => {
        attachNavEvents(); 
        AOS.refresh();
        });
        observer.observe(document.getElementById("main-content"), { childList: true, subtree: true });
        
        // tratamento de pesquisa da home ao clicar já incluso dentro do render da home
    </script>
    </body>
</html>
