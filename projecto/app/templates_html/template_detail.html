<!DOCTYPE html>
<html>
<head>
    <title>{{ template.name }}</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        :root{--bg:#071226;--accent:#15d0d6;--muted:#9fb0bf}
        body{margin:0;font-family:'Poppins',sans-serif;background:var(--bg);color:#eaf6fb}
        .container{max-width:1100px;margin:40px auto;padding:20px}
        .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border-radius:12px;padding:18px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 10px 30px rgba(0,0,0,0.6);display:grid;grid-template-columns:1fr 420px;gap:18px}
        .meta h1{margin:0 0 8px 0}
        .meta p{color:var(--muted)}
        .price{font-size:22px;color:var(--accent);font-weight:800;margin-top:12px}
        .btn{display:inline-block;padding:10px 14px;border-radius:10px;text-decoration:none;color:#041826;background:var(--accent);font-weight:700;margin-right:10px;transition:transform .12s}
        .btn:active{transform:translateY(1px)}
        .actions{margin-top:14px}
        iframe.preview{width:100%;height:420px;border-radius:8px;border:1px solid rgba(255,255,255,0.03)}
        @media (max-width:980px){.card{grid-template-columns:1fr;}.iframe-preview{height:300px}}
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
            <a href="/" style="color:var(--muted);text-decoration:none">← Voltar</a>
        </div>
    </div>

    <div class="card">
        <div class="meta">
            <h1>{{ template.name }}</h1>
            <p>{{ template.description }}</p>
            <div class="price">Preço: ${{ template.price }}</div>

            <div class="actions">
                <a class="btn" href="{{ template.preview_url }}" target="_blank">Abrir Preview</a>
                {% if template.file %}
                <a class="btn" href="/static/{{ template.file }}" download>Baixar (.zip)</a>
                {% endif %}
                <a class="btn" href="https://wa.me/244932740023?text=Quero comprar {{ template.name }}">Comprar via WhatsApp</a>
            </div>
        </div>

        <div class="preview">
            <iframe class="preview" src="{{ template.preview_url }}" title="Preview - {{ template.name }}"></iframe>
        </div>
    </div>
</div>

</body>
</html>
