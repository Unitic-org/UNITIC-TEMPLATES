<!DOCTYPE html>
<html>
<head>
    <title>Templates</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Templates de Landing Pages</h1>

<div class="grid">
    {% for t in templates %}
    <div class="card">
        <h2>{{ t.name }}</h2>
        <p>{{ t.description }}</p>
        <a href="/template/{{ t.id }}">Ver</a>
    </div>
    {% endfor %}
</div>

</body>
</html>
