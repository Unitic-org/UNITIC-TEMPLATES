<!DOCTYPE html>
<html>
<head>
    <title>Sites que Vendem</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --bg:#071226; /* deep navy */
            --panel:#0e1f33;
            --accent:#15d0d6; /* cyan */
            --muted:#98a3b3;
            --glass: rgba(255,255,255,0.03);
        }
        *{box-sizing:border-box}
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(1200px 600px at 80% 20%, #0b2a43 0%, var(--bg) 25%), var(--bg);
            color: #e6eef6;
            -webkit-font-smoothing:antialiased;
        }

        header.site-header{
            display:flex;align-items:center;justify-content:space-between;
            padding:18px 40px;background:transparent;
        }
        .brand{display:flex;align-items:center;gap:12px}
        .brand .logo{width:42px;height:42px;border-radius:6px;background:linear-gradient(90deg,#0ff 10%,#0bb 90%);display:flex;align-items:center;justify-content:center;color:#002; font-weight:700}
        .brand h4{margin:0}

        .hero {
            text-align: left;
            padding: 64px 40px;
            color: white;
            display:flex;gap:40px;align-items:center;justify-content:space-between;
        }

        .hero-left{max-width:620px}
        .hero h1 {font-size:48px;margin:0;line-height:1.02}
        .hero p {color:var(--muted);font-size:18px}

        .cta-row{display:flex;gap:18px;margin-top:28px}
        .btn{background:var(--accent);padding:14px 28px;border-radius:28px;color:#041826;text-decoration:none;font-weight:700;box-shadow:0 10px 30px rgba(21,208,214,0.12);transition:transform .18s ease,box-shadow .18s ease}
        .btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--accent)}
        .btn:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(21,208,214,0.16)}

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-top:18px;
        }

        .card {
            background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(2,6,23,0.6);
            border: 1px solid rgba(255,255,255,0.03);
            transition: transform .25s cubic-bezier(.2,.9,.3,1), box-shadow .25s ease;
            transform-origin:center;
        }
        .card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 18px 40px rgba(3,10,40,0.7)}

        .card-media{height:160px;background-size:cover;background-position:center;display:block}
        .card-content {padding:18px}
        .card h3{margin:0 0 8px 0}
        .card p{color:var(--muted);margin:0}
        .price{font-weight:800;color:var(--accent);margin-top:12px}

        .actions{display:flex;gap:12px;margin-top:14px}
        .action-link{padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.02);color:var(--accent);text-decoration:none;border:1px solid rgba(255,255,255,0.02);transition:background .12s}
        .action-link:hover{background:rgba(21,208,214,0.06)}

        /* subtle staggered fade-in */
        .grid .card{opacity:0;transform:translateY(6px) scale(.995)}
        .grid .card.visible{opacity:1;transform:none;transition:opacity .45s ease,transform .45s cubic-bezier(.2,.9,.3,1)}

        @media (max-width:800px){.hero{flex-direction:column;padding:28px}.hero-left{max-width:100%}.brand h4{display:none}}
    </style>
</head>

<body>

    <div class="hero">
        <div class="hero-left">
            <h1>Landing Pages que Geram Clientes</h1>
            <p>Compra, edita e começa a vender hoje</p>
            <div class="cta-row">
                <a class="btn" href="#templates">Ver Templates</a>
                <a class="btn secondary" href="#">Como funciona</a>
            </div>
        </div>
        <div class="hero-right" aria-hidden="true">
            <!-- decorative phone / illustration placeholder -->
            <svg width="360" height="220" viewBox="0 0 360 220" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 20px 40px rgba(0,0,0,0.5))">
                <rect x="8" y="8" width="344" height="204" rx="28" fill="url(#g)"/>
                <defs>
                    <linearGradient id="g" x1="0" x2="1">
                        <stop offset="0" stop-color="#07263a"/>
                        <stop offset="1" stop-color="#0c2130"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
    </div>

    <div class="container" id="templates">
        <h2 style="margin:0 0 8px 0;color:#cfeaf0">Templates Disponíveis</h2>
        <p style="color:var(--muted);margin:0 0 20px 0">Escolha um layout pronto — personalize e comece a vender.</p>

        <div class="grid" id="templatesGrid">
            {% for t in templates %}
            <div class="card">
                <div class="card-media" style="background-image:url('https://via.placeholder.com/800x400/0a1b2f/15d0d6?text=Template+{{ t.id }}')"></div>

                <div class="card-content">
                    <h3>{{ t.name }}</h3>
                    <p>{{ t.description }}</p>
                    <div class="price">${{ t.price }}</div>

                    <div class="actions">
                        <a class="action-link" href="/template/{{ t.id }}">Ver detalhes</a>
                        <a class="action-link" href="{{ t.preview_url }}" target="_blank">Preview</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
    // Add entrance animation class after paint so items stagger nicely
    window.addEventListener('load', ()=>{
      const cards = document.querySelectorAll('#templatesGrid .card')
      cards.forEach((c,i)=>setTimeout(()=>c.classList.add('visible'), i*80))
    })
    </script>
</body>
</html>

</body>
</html>
